        const localData = [
            { email: "mohammedkaif2666@gmail.com", name: "Mohammed Kaif", roll: "22K81A12G2" },
        ];
        const normalizedPredefinedPhotos = Object.fromEntries(
            Object.entries(predefinedPhotos).map(([email, photo]) => [email.toLowerCase(), photo])
        );

        function escapeHTML(value = "") {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function sanitizeImageSource(value, seed = "User") {
            if (typeof value === "string") {
                const src = value.trim();
                if (/^(data:image\/|https?:\/\/|assets\/)/i.test(src)) {
                    return src;
                }
            }
            return `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(seed)}`;
        }

        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawTargetEmail = (urlParams.get("email") || "").trim();
            const targetEmail = rawTargetEmail.toLowerCase();

            if (!targetEmail) {
                alert("No profile email specified!");
                window.location.href = "directory.html";
                return;
            }

            try {
                // Firebase Query
                let q = query(collection(db, "students"), where("email", "==", rawTargetEmail));
                let querySnapshot = await getDocs(q);
                if (querySnapshot.empty && rawTargetEmail !== targetEmail) {
                    q = query(collection(db, "students"), where("email", "==", targetEmail));
                    querySnapshot = await getDocs(q);
                }
                let data = {};

                if (!querySnapshot.empty) {
                    data = querySnapshot.docs[0].data();
                } else {
                    const local = localData.find((student) => student.email.toLowerCase() === targetEmail);
                    if (local) data = { name: local.name, rollNumber: local.roll };
                }

                const displayName = data.name || "Unknown";
                const imgPath = sanitizeImageSource(data.photoURL || normalizedPredefinedPhotos[targetEmail], displayName);

                // Inject Data
                document.getElementById("vp-name").textContent = displayName;
                const vpPhoto = document.getElementById("vp-photo");
                vpPhoto.src = imgPath;
                vpPhoto.onerror = () => {
                    vpPhoto.src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(displayName)}`;
                };
                document.getElementById("vp-role").textContent = data.role || "Student";
                document.getElementById("vp-roll").textContent = data.rollNumber || "IT Department";
                document.getElementById("vp-quote").textContent = data.quote || "Writing my story...";

                // Render Dynamic Sections (Editorial Style)
                const sectionContainer = document.getElementById("vp-sections");
                sectionContainer.innerHTML = "";

                if (Array.isArray(data.customSections) && data.customSections.length > 0) {
                    data.customSections.forEach((sec) => {
                        const safeTitle = escapeHTML(sec?.title || "Untitled Section");
                        const safeContent = escapeHTML(sec?.content || "").replace(/\n/g, "<br>");
                        const hasImage = typeof sec?.image === "string" && sec.image.trim() !== "";
                        const safeImage = hasImage ? sanitizeImageSource(sec.image, sec.title || displayName) : "";

                        const html = `
                            <div class="group" data-aos="fade-up" data-aos-duration="1000">
                                <h2 class="text-3xl font-serif font-bold text-slate-900 mb-6 group-hover:text-gold transition-colors duration-300 flex items-center gap-4">
                                    ${safeTitle}
                                    <span class="h-px bg-slate-200 flex-1 group-hover:bg-gold/30 transition-colors"></span>
                                </h2>

                                <div class="text-lg text-slate-600 leading-[1.8] font-serif mb-8">
                                    ${safeContent}
                                </div>

                                ${hasImage ? `
                                <div class="relative overflow-hidden rounded-sm" data-aos="zoom-in" data-aos-delay="200">
                                    <img src="${safeImage}" class="w-full h-auto object-cover grayscale hover:grayscale-0 transition-all duration-700">
                                    <div class="absolute inset-0 border border-black/5 pointer-events-none"></div>
                                </div>` : ""}
                            </div>
                        `;
                        sectionContainer.insertAdjacentHTML("beforeend", html);
                    });
                } else {
                    sectionContainer.innerHTML = `
                         <div class="h-64 flex flex-col items-center justify-center border border-dashed border-slate-300 p-12 text-center" data-aos="fade-up">
                            <p class="font-serif text-2xl text-slate-400 italic mb-2">"The best chapters are yet to be written."</p>
                            <span class="text-xs uppercase tracking-widest text-slate-300">No content added yet</span>
                        </div>
                    `;
                }

                // Reveal UI
                const loader = document.getElementById("loading-state");
                const content = document.getElementById("profile-content");

                loader.classList.add("opacity-0");
                setTimeout(() => {
                    loader.classList.add("hidden");
                    content.classList.remove("hidden");
                    setTimeout(() => content.classList.remove("opacity-0"), 50);
                }, 500);

                setTimeout(() => {
                    if (window.AOS) window.AOS.refresh();
                }, 600);

            } catch (error) {
                console.error(error);
                alert("Error loading profile.");
            }
        }
